name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: JossLanxs
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=F5DEB3&color_dots[0]=cccccc&color_dots[1]=aaaaaa&color_dots[2]=888888&color_dots[3]=555555&color_dots[4]=F5DEB3
            dist/github-contribution-grid-snake-dark.svg?color_snake=F5DEB3&color_dots[0]=333333&color_dots[1]=555555&color_dots[2]=777777&color_dots[3]=aaaaaa&color_dots[4]=F5DEB3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
