name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: JossLanxs
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FFD700&color_dots[0]=cccccc&color_dots[1]=aaaaaa&color_dots[2]=888888&color_dots[3]=555555&color_dots[4]=333333
            dist/github-contribution-grid-snake-dark.svg?color_snake=FFD700&color_dots[0]=ffffff&color_dots[1]=dddddd&color_dots[2]=aaaaaa&color_dots[3]=777777&color_dots[4]=444444
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
